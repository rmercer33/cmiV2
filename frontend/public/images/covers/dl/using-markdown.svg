<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 918" width="612" height="918">
  <defs>
    <!-- Background Gradient (Deep Space Forest to Emerald Obsidian) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020804" /> <!-- Pure Forest Black -->
      <stop offset="50%" stop-color="#061f10" /> <!-- Deep Jungle Green -->
      <stop offset="100%" stop-color="#065f46" /> <!-- Emerald Green -->
    </linearGradient>

    <!-- Glowing Neon Emerald Gradient -->
    <linearGradient id="glowing-emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" /> <!-- Neon Mint/Emerald -->
      <stop offset="100%" stop-color="#059669" /> <!-- Teal/Forest -->
    </linearGradient>

    <!-- Accent Warm Gold Gradient -->
    <linearGradient id="glowing-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" /> <!-- Amber Gold -->
      <stop offset="100%" stop-color="#78350f" /> <!-- Dark Bronze -->
    </linearGradient>

    <!-- Blueprint Tech Line Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#064e3b" stroke-width="1" opacity="0.3" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Cover Canvas Background -->
  <rect width="612" height="918" fill="url(#bg-grad)" />

  <!-- Technical Grid Overlay -->
  <rect width="612" height="918" fill="url(#grid)" />

  <!-- Outer Border Design (Classic Library Frame) -->
  <rect x="25" y="25" width="562" height="868" fill="none" stroke="url(#glowing-emerald)" stroke-width="2" stroke-opacity="0.5" rx="6" />
  <rect x="35" y="35" width="542" height="848" fill="none" stroke="url(#glowing-gold)" stroke-width="1" stroke-opacity="0.3" rx="4" />

  <!-- Decorative Corner Geometries -->
  <g stroke="url(#glowing-emerald)" stroke-width="2" fill="none" stroke-opacity="0.7">
    <path d="M 20,45 L 45,45 L 45,20" />
    <path d="M 592,45 L 567,45 L 567,20" />
    <path d="M 20,873 L 45,873 L 45,898" />
    <path d="M 592,873 L 567,873 L 567,898" />
  </g>

  <!-- Large Stylized Markdown 'M' Watermark in Background -->
  <g fill="none" stroke="#042f1a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
    <path d="M 210,480 L 210,360 L 260,420 L 310,360 L 310,480" />
    <rect x="345" y="360" width="60" height="120" rx="8" stroke-width="4" />
    <path d="M 375,380 L 375,460 M 355,430 L 375,460 L 395,430" stroke-width="6" />
  </g>

  <!-- Centered Glowing Manuscript and Nib Graphic -->
  <g transform="translate(306, 420)" filter="url(#shadow)">
    <!-- Glowing Tech Circles -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#glowing-emerald)" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.4" />
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#glowing-gold)" stroke-width="1" opacity="0.2" />

    <!-- Stylized Paper Sheet (Representing Documentation) -->
    <rect x="-60" y="-85" width="120" height="170" rx="4" fill="#022c22" stroke="url(#glowing-emerald)" stroke-width="2" stroke-linejoin="round" />
    
    <!-- Curled Corner effect -->
    <path d="M 40,85 L 60,65 L 60,85 Z" fill="#047857" />
    <path d="M 40,85 L 40,65 L 60,65 Z" fill="#022c22" stroke="url(#glowing-emerald)" stroke-width="1" />

    <!-- Horizontal Document Text lines (Representing code/markdown) -->
    <line x1="-40" y1="-55" x2="10" y2="-55" stroke="#34d399" stroke-width="4" stroke-linecap="round" />
    <line x1="-40" y1="-35" x2="40" y2="-35" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="-40" y1="-15" x2="30" y2="-15" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" />
    <line x1="-40" y1="5" x2="20" y2="5" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="-40" y1="25" x2="40" y2="25" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <line x1="-40" y1="45" x2="10" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" />

    <!-- Technical Digital Callout Pen / Nib Drawing Detail -->
    <g transform="translate(25, 45)" filter="url(#neon-glow)">
      <!-- Glowing Vector Nib -->
      <path d="M -15,-45 L 15,-45 L 10,-10 L 0,15 L -10,-10 Z" fill="url(#glowing-gold)" stroke="#ffffff" stroke-width="0.5" />
      <line x1="0" y1="-45" x2="0" y2="5" stroke="#022c22" stroke-width="1.5" />
      <circle cx="0" cy="-15" r="2.5" fill="#022c22" />
      <circle cx="0" cy="15" r="4" fill="#34d399" filter="url(#neon-glow)" />
    </g>
  </g>

  <!-- Typography & Book Headers -->
  <g text-anchor="middle" font-family="'Inter', sans-serif, system-ui">
    
    <!-- Author/Subject Tag -->
    <text x="306" y="115" fill="#34d399" font-size="14" font-weight="800" letter-spacing="6">TECHNICAL SERIES</text>
    <line x1="220" y1="130" x2="392" y2="130" stroke="url(#glowing-emerald)" stroke-width="1.5" opacity="0.6" />

    <!-- Volume Title (Big, Elegant, Glowing) -->
    <text x="306" y="700" fill="#ffffff" font-size="44" font-weight="900" letter-spacing="2" filter="url(#shadow)">USING MARKDOWN</text>
    
    <!-- Subtitle -->
    <text x="306" y="745" fill="#fbbf24" font-size="14" font-weight="700" letter-spacing="4">RICH TRANSCRIPT FORMATTING</text>
    
    <!-- Ornamental Divider Line -->
    <circle cx="306" cy="780" r="4" fill="#10b981" filter="url(#neon-glow)" />
    <line x1="160" y1="780" x2="286" y2="780" stroke="url(#glowing-emerald)" stroke-width="1" opacity="0.4" />
    <line x1="326" y1="780" x2="452" y2="780" stroke="url(#glowing-emerald)" stroke-width="1" opacity="0.4" />

    <!-- Summary Details Footer -->
    <text x="306" y="825" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="1.5">An absolute guide to headings, codeblocks, text syntax,</text>
    <text x="306" y="845" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="1.5">dynamic variables, custom css classes, and internal links.</text>
  </g>
</svg>