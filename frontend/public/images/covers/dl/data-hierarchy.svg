<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 918" width="612" height="918">
  <defs>
    <!-- Background Gradient (Deep Space Navy to Dark Royal Blue) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050811" /> <!-- Midnight Black -->
      <stop offset="50%" stop-color="#0f172a" /> <!-- Dark Slate -->
      <stop offset="100%" stop-color="#1e3a8a" /> <!-- Royal Blue -->
    </linearGradient>

    <!-- Glowing Cyan/Teal Gradient -->
    <linearGradient id="glowing-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Neon Cyan -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Vibrant Blue -->
    </linearGradient>

    <!-- Accent Gold Gradient -->
    <linearGradient id="glowing-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" /> <!-- Gold -->
      <stop offset="100%" stop-color="#b45309" /> <!-- Bronze -->
    </linearGradient>

    <!-- Technical Blueprint Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.4" />
    </pattern>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base Cover Canvas Background -->
  <rect width="612" height="918" fill="url(#bg-grad)" />

  <!-- Technical Blueprint Grid Overlay -->
  <rect width="612" height="918" fill="url(#grid)" />

  <!-- Outer Border Design (Classic Library Frame) -->
  <rect x="25" y="25" width="562" height="868" fill="none" stroke="url(#glowing-cyan)" stroke-width="2" stroke-opacity="0.5" rx="6" />
  <rect x="35" y="35" width="542" height="848" fill="none" stroke="url(#glowing-gold)" stroke-width="1" stroke-opacity="0.3" rx="4" />

  <!-- Decorative Corner Geometries -->
  <g stroke="url(#glowing-cyan)" stroke-width="2" fill="none" stroke-opacity="0.7">
    <path d="M 20,45 L 45,45 L 45,20" />
    <path d="M 592,45 L 567,45 L 567,20" />
    <path d="M 20,873 L 45,873 L 45,898" />
    <path d="M 592,873 L 567,873 L 567,898" />
  </g>

  <!-- Giant Background Circuit/Data Node Rings (Technical Backdrop) -->
  <circle cx="306" cy="420" r="180" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.7" />
  <circle cx="306" cy="420" r="150" fill="none" stroke="url(#glowing-cyan)" stroke-width="1" opacity="0.2" />

  <!-- Centered Data Hierarchy Geometric Diagram (3D Nested Cubes/Data Layers) -->
  <g transform="translate(306, 420)" filter="url(#shadow)">
    <!-- Tech Lines/Rays -->
    <line x1="0" y1="-140" x2="0" y2="140" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />
    <line x1="-140" y1="0" x2="140" y2="0" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 4" opacity="0.4" />

    <!-- Outer Layer 1 (Base/Library Level) -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="none" stroke="url(#glowing-cyan)" stroke-width="2.5" stroke-linejoin="round" />
    
    <!-- Middle Layer 2 (Source/Book Level) -->
    <polygon points="0,-85 73,-42 73,42 0,85 -73,42 -73,-42" fill="none" stroke="url(#glowing-gold)" stroke-width="2" stroke-linejoin="round" opacity="0.8" />

    <!-- Inner Layer 3 (Group/Unit Level) -->
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="#0f172a" stroke="url(#glowing-cyan)" stroke-width="1.5" stroke-linejoin="round" />
    
    <!-- Inner Core Glowing Data Node -->
    <circle cx="0" cy="0" r="10" fill="#3b82f6" filter="url(#neon-glow)" />
    <circle cx="0" cy="0" r="5" fill="#ffffff" />

    <!-- Circuit Connecting Paths & Outer Nodes -->
    <g fill="#06b6d4" stroke="#06b6d4" stroke-width="1.5">
      <circle cx="0" cy="-120" r="5" filter="url(#neon-glow)" />
      <circle cx="104" cy="60" r="5" />
      <circle cx="-104" cy="60" r="5" />
      <circle cx="73" cy="-42" r="4" fill="#f59e0b" />
      <circle cx="-73" cy="-42" r="4" fill="#f59e0b" />
    </g>
  </g>

  <!-- Typography & Book Headers -->
  <g text-anchor="middle" font-family="'Inter', sans-serif, system-ui">
    
    <!-- Author/Subject Tag -->
    <text x="306" y="115" fill="#38bdf8" font-size="14" font-weight="800" letter-spacing="6">TECHNICAL SERIES</text>
    <line x1="220" y1="130" x2="392" y2="130" stroke="url(#glowing-cyan)" stroke-width="1.5" opacity="0.6" />

    <!-- Volume Title (Big, Elegant, Glowing) -->
    <text x="306" y="700" fill="#ffffff" font-size="44" font-weight="900" letter-spacing="2" filter="url(#shadow)">DATA HIERARCHY</text>
    
    <!-- Subtitle -->
    <text x="306" y="745" fill="#fbbf24" font-size="14" font-weight="700" letter-spacing="4">7-TIER CATALOG ARCHITECTURE</text>
    
    <!-- Ornamental Divider Line -->
    <circle cx="306" cy="780" r="4" fill="#38bdf8" filter="url(#neon-glow)" />
    <line x1="160" y1="780" x2="286" y2="780" stroke="url(#glowing-cyan)" stroke-width="1" opacity="0.4" />
    <line x1="326" y1="780" x2="452" y2="780" stroke="url(#glowing-cyan)" stroke-width="1" opacity="0.4" />

    <!-- Summary Details Footer -->
    <text x="306" y="825" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="1.5">A complete guide to multi-language collections, sections,</text>
    <text x="306" y="845" fill="#94a3b8" font-size="12" font-weight="500" letter-spacing="1.5">sources, and recursive sorting configuration.</text>
  </g>
</svg>