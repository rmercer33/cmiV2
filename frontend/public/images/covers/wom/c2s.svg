<svg width="612" height="792" viewBox="0 0 612 792" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Deep Indigo/Midnight transitioning to Royal Blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050C1A" />
      <stop offset="50%" stop-color="#0B1B33" />
      <stop offset="100%" stop-color="#030714" />
    </linearGradient>

    <!-- Metallic Gold Gradient for Frames & Accents -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C59F4E" />
      <stop offset="25%" stop-color="#FFF8C4" />
      <stop offset="50%" stop-color="#B88E33" />
      <stop offset="75%" stop-color="#FFF9CD" />
      <stop offset="100%" stop-color="#B2841E" />
    </linearGradient>

    <!-- Radiating Sunrise Glow -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEFA6" stop-opacity="0.4" />
      <stop offset="40%" stop-color="#F3B33E" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#050C1A" stop-opacity="0" />
    </radialGradient>

    <!-- Soft Drop Shadow for Text/Emblem -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="612" height="792" fill="url(#bgGrad)" />

  <!-- Radiating Sunrise Glow -->
  <circle cx="306" cy="415" r="300" fill="url(#sunGlow)" />

  <!-- Classical Gold Border Frame -->
  <rect x="25" y="25" width="562" height="742" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.85" />
  <rect x="33" y="33" width="546" height="726" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5" />

  <!-- Corner Ornamental Accent Markers -->
  <g stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.85">
    <!-- Top-Left Corner Ornament -->
    <path d="M 20,40 L 40,40 L 40,20" />
    <circle cx="40" cy="40" r="3" fill="url(#goldGrad)" />
    <!-- Top-Right Corner Ornament -->
    <path d="M 592,40 L 572,40 L 572,20" />
    <circle cx="572" cy="40" r="3" fill="url(#goldGrad)" />
    <!-- Bottom-Left Corner Ornament -->
    <path d="M 20,752 L 40,752 L 40,772" />
    <circle cx="40" cy="752" r="3" fill="url(#goldGrad)" />
    <!-- Bottom-Right Corner Ornament -->
    <path d="M 592,752 L 572,752 L 572,772" />
    <circle cx="572" cy="752" r="3" fill="url(#goldGrad)" />
  </g>

  <!-- Typography Header: Source Context -->
  <g filter="url(#shadow)">
    <text x="306" y="90" 
          font-family="'Cinzel', 'Didot', 'Playfair Display', 'Times New Roman', serif" 
          font-size="13" 
          font-weight="600" 
          fill="url(#goldGrad)" 
          letter-spacing="5" 
          text-anchor="middle" 
          opacity="0.9">
      THE WAY OF MASTERY
    </text>
    <text x="306" y="112" 
          font-family="'Cinzel', 'Didot', 'Playfair Display', 'Times New Roman', serif" 
          font-size="11" 
          font-weight="500" 
          fill="#FFFFFF" 
          letter-spacing="4" 
          text-anchor="middle" 
          opacity="0.8">
      THE EARLY YEARS
    </text>
  </g>

  <!-- Header Separator Line -->
  <line x1="180" y1="135" x2="432" y2="135" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4" />

  <!-- Main Title: Choose to See -->
  <g filter="url(#shadow)">
    <text x="306" y="215" 
          font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
          font-size="44" 
          font-weight="700" 
          fill="url(#goldGrad)" 
          text-anchor="middle"
          letter-spacing="1">
      Choose
    </text>
    <text x="306" y="260" 
          font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
          font-size="24" 
          font-style="italic" 
          font-weight="500" 
          fill="#FFFFFF" 
          text-anchor="middle" 
          opacity="0.95">
      to
    </text>
    <text x="306" y="320" 
          font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
          font-size="52" 
          font-weight="700" 
          fill="url(#goldGrad)" 
          text-anchor="middle" 
          letter-spacing="2">
      See
    </text>
  </g>

  <!-- Central Symbol: Elegant, Stylized Radiating Sunrise / Eye of Vision -->
  <g transform="translate(306, 485)" filter="url(#shadow)">
    <!-- Light Ray Lines (Expanding Vision) -->
    <g stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.45" fill="none">
      <line x1="0" y1="-85" x2="0" y2="-55" />
      <line x1="-85" y1="0" x2="-55" y2="0" />
      <line x1="55" y1="0" x2="85" y2="0" />
      <!-- Diagonal Rays -->
      <line x1="-60" y1="-60" x2="-38" y2="-38" />
      <line x1="38" y1="-38" x2="60" y2="-60" />
      <!-- Angle Rays -->
      <line x1="-78" y1="-32" x2="-50" y2="-20" />
      <line x1="78" y1="-32" x2="50" y2="-20" />
      <line x1="-32" y1="-78" x2="-20" y2="-50" />
      <line x1="32" y1="-78" x2="20" y2="-50" />
    </g>

    <!-- Concentric Golden Circles of Clarity -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3" />
    <circle cx="0" cy="0" r="38" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.7" />

    <!-- Stylized Eye / Lens of Light Path -->
    <path d="M -45,0 
             C -25,-25 25,-25 45,0 
             C 25,25 -25,25 -45,0 Z" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="2.5" 
          opacity="0.85" />

    <!-- Radiant Pupil (Central Star of Sight) -->
    <circle cx="0" cy="0" r="12" fill="url(#goldGrad)" opacity="0.95" />
    <polygon points="0,-18 3.5,-5 18,0 3.5,5 0,18 -3.5,5 -18,0 -3.5,-5" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- Footer Separator Line -->
  <line x1="220" y1="630" x2="392" y2="630" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4" />

  <!-- Footer Typography -->
  <g filter="url(#shadow)">
    <text x="306" y="665" 
          font-family="'Cinzel', 'Didot', 'Playfair Display', 'Times New Roman', serif" 
          font-size="11" 
          font-weight="500" 
          fill="#FFFFFF" 
          letter-spacing="2" 
          text-anchor="middle" 
          opacity="0.85">
      IMMERSIBLE STUDY MODULE
    </text>
    <text x="306" y="688" 
          font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
          font-size="12" 
          font-style="italic" 
          fill="url(#goldGrad)" 
          text-anchor="middle" 
          opacity="0.9">
      "The soul’s eye is opened to the vision of truth"
    </text>
  </g>

</svg>
