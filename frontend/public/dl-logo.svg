<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background and Emblem Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/> <!-- Midnight Slate -->
      <stop offset="100%" stop-color="#0f172a"/> <!-- Darker Slate -->
    </linearGradient>
    
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#fbbf24"/> <!-- Warm Gold -->
      <stop offset="50%" stop-color="#f59e0b"/> <!-- Amber -->
      <stop offset="100%" stop-color="#d97706"/> <!-- Bronze/Ochre -->
    </linearGradient>

    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4"/> <!-- Sky Blue Glow -->
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base Rounded Hexagon/Emblem Background -->
  <path d="M 100,10 
           L 178,55 
           L 178,145 
           L 100,190 
           L 22,145 
           L 22,55 
           Z" 
        fill="url(#bg-grad)" 
        stroke="url(#gold-grad)" 
        stroke-width="4" 
        stroke-linejoin="round"
        filter="url(#shadow)"
  />

  <!-- Digital Glow Rays emerging from the book -->
  <path d="M 100,115 L 70,60 L 130,60 Z" fill="url(#glow-grad)" />
  <path d="M 100,115 L 45,75 L 155,75 Z" fill="url(#glow-grad)" />

  <!-- Digital Nodes/Data Elements (Floating bits of light) -->
  <circle cx="100" cy="50" r="4" fill="#38bdf8" />
  <circle cx="70" cy="65" r="3.5" fill="#38bdf8" opacity="0.8" />
  <circle cx="130" cy="65" r="3.5" fill="#38bdf8" opacity="0.8" />
  <circle cx="50" cy="85" r="2.5" fill="#38bdf8" opacity="0.6" />
  <circle cx="150" cy="85" r="2.5" fill="#38bdf8" opacity="0.6" />

  <!-- Connecting Data Lines (Tech/Circuitry aesthetic) -->
  <line x1="100" y1="50" x2="70" y2="65" stroke="#38bdf8" stroke-width="1" opacity="0.5" />
  <line x1="100" y1="50" x2="130" y2="65" stroke="#38bdf8" stroke-width="1" opacity="0.5" />
  <line x1="70" y1="65" x2="50" y2="85" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
  <line x1="130" y1="65" x2="150" y2="85" stroke="#38bdf8" stroke-width="1" opacity="0.4" />

  <!-- Stylized Open Book Symbol -->
  <!-- Left Page -->
  <path d="M 100,125 
           C 80,115 55,115 40,122 
           L 40,102 
           C 55,95 80,95 100,105 
           Z" 
        fill="url(#gold-grad)" 
  />
  
  <!-- Right Page -->
  <path d="M 100,125 
           C 120,115 145,115 160,122 
           L 160,102 
           C 145,95 120,95 100,105 
           Z" 
        fill="url(#gold-grad)" 
  />

  <!-- Page Thickness/Shadows -->
  <path d="M 40,122 C 55,115 80,115 100,125 C 120,115 145,115 160,122 L 160,125 C 145,118 120,118 100,128 C 80,118 55,118 40,125 Z" fill="#92400e" />

  <!-- Center Bookmark Ribbon -->
  <path d="M 98,103 L 98,138 L 102,138 L 102,103 Z" fill="#ef4444" />
  <path d="M 98,138 L 100,135 L 102,138 Z" fill="#991b1b" />

  <!-- Binary/Circuit Accent Arc -->
  <path d="M 35,140 A 75,75 0 0,0 165,140" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.7" />
  
  <!-- Digital Core/Library Text Emblem -->
  <text x="100" y="165" fill="#f8fafc" font-family="'Inter', sans-serif, system-ui" font-size="16" font-weight="800" text-anchor="middle" letter-spacing="4">DIGITAL</text>
  <text x="100" y="180" fill="#fbbf24" font-family="'Inter', sans-serif, system-ui" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">LIBRARY</text>
</svg>